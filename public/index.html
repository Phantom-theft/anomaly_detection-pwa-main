<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Anomaly Detection Progressive Web App" />
    <title>Anomaly Detection App</title>

    <!-- Icons -->
    <link rel="icon" href="/icons/192x192.png" />
    <link rel="apple-touch-icon" href="/icons/180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/180x180.png" />

    <!-- Mobile Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Anomaly App" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://apis.google.com">
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin="anonymous">

    <style>
        @font-face {
            font-family: 'MyFont';
            src: url('/fonts/Poppins-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        html, body, #root {
            font-family: 'MyFont', sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker
                    .register("/serviceworker.js")
                    .then((reg) => {
                        console.log("Service Worker registered: ", reg.scope);
                    })
                    .catch((err) => console.error("Service Worker failed: ", err));
            });
        }
    </script>
</body>
</html>
